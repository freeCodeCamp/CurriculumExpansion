<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Registration Form</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>

  <body>
    <main>
      <h1>User Registration</h1>

      <form aria-labelledby="registration-heading">
        <fieldset>
          <legend id="registration-heading">Register a new user</legend>

          <label for="name-input">Name</label>
          <input
            type="text"
            id="name-input"
            name="name"
            placeholder="Enter your name"
            autocomplete="name"
            required
          />

          <label for="age-input">Age</label>
          <input
            type="number"
            id="age-input"
            name="age"
            placeholder="Enter your age"
            inputmode="numeric"
            min="13"
            required
            aria-describedby="age-help"
          />
          <p id="age-help">Users must be at least 13 years old.</p>

          <button type="button" id="submit-btn">Register</button>
        </fieldset>
      </form>

      <p id="result" aria-live="polite" aria-atomic="true"></p>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
